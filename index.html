<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal da Escola</title>

  <link rel="stylesheet" href="style.css">

  <!-- Ícones -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="container">
    <h1>Portal da Escola</h1>

    <div class="cards">
      <div class="card" onclick="mostrarInfo('secretaria')">
        <i class="fas fa-file-alt"></i>
        <h2>Secretaria</h2>
      </div>

      <div class="card" onclick="mostrarInfo('direcao')">
        <i class="fas fa-user-tie"></i>
        <h2>Direção</h2>
      </div>

      <div class="card" onclick="mostrarInfo('estoque')">
        <i class="fas fa-boxes-stacked"></i>
        <h2>Estoque</h2>
      </div>
    </div>

    <!-- Área onde as informações aparecerão -->
    <div id="info" class="info-box"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
